# Build and test open-bambu-networking on Linux x64 / aarch64 and on
# Windows x64 (MSVC + vcpkg manifest).
#
# Version strategy: the plugin must report a string whose first 8 characters
# match Bambu Studio's SLIC3R_VERSION. We therefore look up the most recent
# tag in https://github.com/bambulab/BambuStudio.git at CI time, strip the
# leading "v", and bump the last component to "99" (same rule ./configure
# uses for local auto-detection). This means CI follows upstream releases
# automatically -- no manual version bumps in this repo.
#
# Linux artifacts (one set per ABI version / architecture):
#   * libbambu_networking.so
#   * libBambuSource.so
#   * liblive555.so
#   * network_plugins.json
#
# Windows artifacts (one set per ABI version):
#   * bambu_networking.dll
#   * BambuSource.dll
#   * live555.dll (stub)
#   * network_plugins.json
#   * ota/plugins/

name: Build

on:
  push:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '15 2 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, architecture-independent check: compare the ABI surface
  # (bambu_networking.hpp + NetworkAgent.hpp + bambu_network_* dlsym list)
  # at the most recent bambulab/BambuStudio tag on github.com against the
  # baseline under tools/abi_snapshot/vMM.mm.pp/ (series from the tag).
  # See tools/check_abi_compat.sh for the full list of checks.
  abi-compat:
    name: abi-compat
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl git

      - name: Check ABI against latest upstream Bambu Studio tag
        run: tools/check_abi_compat.sh

  build:
    name: v${{ matrix.abi }}.xx-linux-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        abi:
          - 02.05.00
          - 02.05.01
          - 02.05.02
          - 02.05.03
          - 02.06.00
          - 02.06.01
        arch:
          - x64
          - aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config ca-certificates git \
            libcjson-dev uthash-dev libcurl4-openssl-dev libssl-dev zlib1g-dev

      - name: Configure
        run: |
          ./configure \
            --build-type=Release \
            --vendor-mosquitto \
            --enable-tests \
            --with-version='${{ matrix.abi }}.99' \
            --no-conf-patch

      - name: Build
        run: make -j"$(nproc)"

      - name: Run tests
        # The only ctest target that does real I/O is `lan_live`, and it
        # self-skips when OBN_PRINTER_IP / _SERIAL / _ACCESS_CODE are unset,
        # which is always the case here. `plugin_symbols` is a pure dlopen
        # smoke test and exercises every ABI symbol Studio looks up.
        run: make test

      - name: Verify built plugin exports every ABI symbol
        # `abi-compat` job above compares source-side files only. This step
        # additionally nm's the freshly built .so to confirm we did not
        # lose any exported entry point in this architecture's toolchain.
        run: tools/check_abi_compat.sh --so=build/libbambu_networking.so

      - name: Stage artifacts
        run: |
          set -eu
          mkdir -p dist
          cp build/libbambu_networking.so dist/
          cp build/libBambuSource.so      dist/
          cp build/liblive555.so          dist/
          cp build/network_plugins.json   dist/
          ls -l dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: obn-linux-v${{ matrix.abi }}.xx-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  build-windows:
    name: v${{ matrix.abi }}.xx-windows-x64
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        abi:
          - 02.05.00
          - 02.05.01
          - 02.05.02
          - 02.05.03
          - 02.06.00
          - 02.06.01

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Shallow clone at master does not necessarily contain the commit in
      # vcpkg.json "builtin-baseline" — manifest resolution needs that tree.
      - name: Bootstrap vcpkg (builtin-baseline from vcpkg.json)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:GITHUB_WORKSPACE 'vcpkg'
          $baseline = '7147ac1294ef9647e8679e1183ac440a5d0a63b7'
          if (Test-Path $root) { Remove-Item -Recurse -Force $root }
          New-Item -ItemType Directory -Path $root | Out-Null
          git init $root
          git -C $root remote add origin https://github.com/microsoft/vcpkg.git
          git -C $root fetch --depth 1 origin $baseline
          git -C $root checkout --detach FETCH_HEAD
          & "$root/bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staging = Join-Path $env:GITHUB_WORKSPACE "install"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          .\configure.ps1 `
            -ClientType bambu_studio `
            -WithVersion '${{ matrix.abi }}.99' `
            -Prefix $staging `
            -PatchConf:$false `
            -RegisterDShowFilter:$false `
            -EnableTests:$true `
            -VcpkgRoot (Join-Path $env:GITHUB_WORKSPACE 'vcpkg') `
            -Generator 'Visual Studio 17 2022'

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build build --config Release --parallel

      - name: Test (probe_plugin)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location build
          ctest -C Release --output-on-failure
          Pop-Location

      - name: Install
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --install build --config Release

      - name: Stage artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Join-Path $env:GITHUB_WORKSPACE "install"
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item -Path (Join-Path $src 'plugins\*') -Destination $dist -Force
          $ota = Join-Path $src 'ota'
          if (Test-Path $ota) {
            Copy-Item -Path $ota -Destination (Join-Path $dist 'ota') -Recurse -Force
          }
          Get-ChildItem -Recurse $dist | Format-Table FullName,Length -AutoSize

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: obn-v${{ matrix.abi }}.xx-windows-x64
          path: dist/
          if-no-files-found: error
