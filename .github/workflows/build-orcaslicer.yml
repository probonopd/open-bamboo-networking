# Build open-bambu-networking as an OrcaSlicer network plugin for the latest
# released (non-prerelease) OrcaSlicer tag on GitHub.
#
# Version strategy:
#   1. Get the latest non-prerelease tag from OrcaSlicer/OrcaSlicer via the
#      GitHub Releases API (/releases/latest always excludes pre-releases).
#   2. Fetch src/slic3r/Utils/bambu_networking.hpp from that tag and extract
#      the entry in AVAILABLE_NETWORK_VERSIONS that has is_latest = true.
#      That is the exact version string OrcaSlicer will look for on disk.
#   3. Build with --with-version=<detected> and --client-type=orca_slicer.
#      For OrcaSlicer the plugin .so/.dll is named with the version in the
#      filename (libbambu_networking_02.03.00.62.so), so no .99 bump is
#      needed -- we ship the exact version OrcaSlicer expects.
#
# Platforms / architectures (one artifact set each):
#   Linux x64     ubuntu-24.04
#   Linux aarch64 ubuntu-24.04-arm
#   macOS x86_64  macos-13
#   macOS aarch64 macos-14
#   Windows x64   windows-2022

name: Build for OrcaSlicer

on:
  push:
  workflow_dispatch:
  pull_request:
  schedule:
    # Run daily so we pick up new OrcaSlicer releases automatically.
    - cron: '25 2 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Determine the latest OrcaSlicer release and the network plugin version it
  # expects.  Outputs are consumed by all build jobs.
  # ---------------------------------------------------------------------------
  get-version:
    name: get-orca-version
    runs-on: ubuntu-24.04
    outputs:
      orca_tag:        ${{ steps.detect.outputs.orca_tag }}
      network_version: ${{ steps.detect.outputs.network_version }}
    steps:
      - name: Detect latest OrcaSlicer release and network plugin version
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu

          # gh (pre-installed on Actions runners) handles auth automatically and
          # is not rate-limited the way anonymous curl calls are.
          # --exclude-pre-releases ensures we only consider stable releases.
          TAG=$(gh release list \
            --repo OrcaSlicer/OrcaSlicer \
            --exclude-pre-releases \
            --limit 1 \
            --json tagName \
            -q '.[0].tagName')
          echo "Latest OrcaSlicer release: $TAG"
          echo "orca_tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Fetch the header that declares AVAILABLE_NETWORK_VERSIONS.
          HPP=$(curl -fsSL \
            "https://raw.githubusercontent.com/OrcaSlicer/OrcaSlicer/${TAG}/src/slic3r/Utils/bambu_networking.hpp")

          # Extract the version entry with is_latest = true.
          # Format:  {"02.03.00.62", "display", url_or_null, true, warning_or_null}
          NET_VER=$(echo "$HPP" | python3 -c "
          import sys, re
          content = sys.stdin.read()
          # Match {\"VER\", \"...\", ..., true, ...}
          m = re.search(r'\{\"([0-9][0-9.]+)\"[^}]+,\s*true\s*,', content)
          if m:
              print(m.group(1))
          else:
              # Fallback: first version in the list (index 0 is always latest).
              m2 = re.search(r'\{\"([0-9][0-9.]+)\"', content)
              print(m2.group(1) if m2 else '02.03.00.62')
          ")

          echo "Network plugin version: ${NET_VER}"
          echo "network_version=${NET_VER}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Linux  (x64 and aarch64)
  # ---------------------------------------------------------------------------
  build-linux:
    needs: get-version
    name: orca-linux-${{ matrix.arch }}-v${{ needs.get-version.outputs.network_version }}
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config ca-certificates git \
            libcjson-dev uthash-dev libcurl4-openssl-dev libssl-dev zlib1g-dev

      - name: Configure
        run: |
          ./configure \
            --client-type=orca_slicer \
            --build-type=Release \
            --with-version='${{ needs.get-version.outputs.network_version }}' \
            --no-conf-patch

      - name: Build
        run: make -j"$(nproc)"

      - name: Run tests
        run: make test

      - name: Install
        run: cmake --install build --prefix "$GITHUB_WORKSPACE/install"

      - name: Stage artifacts
        run: |
          set -eu
          mkdir -p dist
          cp install/plugins/*  dist/
          ls -l dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obn-orca-${{ needs.get-version.outputs.orca_tag }}-linux-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS  (x86_64 on macos-13, aarch64 on macos-14)
  # ---------------------------------------------------------------------------
  build-macos:
    needs: get-version
    name: orca-macos-${{ matrix.arch }}-v${{ needs.get-version.outputs.network_version }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: aarch64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eu
          brew install pkg-config cmake openssl@3 curl cjson zlib uthash
          {
            echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
            PC="$(brew --prefix openssl@3)/lib/pkgconfig"
            PC="${PC}:$(brew --prefix curl)/lib/pkgconfig"
            PC="${PC}:$(brew --prefix zlib)/lib/pkgconfig"
            PC="${PC}:$(brew --prefix cjson)/lib/pkgconfig"
            echo "PKG_CONFIG_PATH=${PC}"
          } >> "$GITHUB_ENV"

      - name: Configure
        run: |
          ./configure \
            --client-type=orca_slicer \
            --build-type=Release \
            --with-version='${{ needs.get-version.outputs.network_version }}' \
            --no-conf-patch

      - name: Build
        run: make -j"$(sysctl -n hw.ncpu)"

      - name: Run tests
        run: make test

      - name: Install
        run: cmake --install build --prefix "$GITHUB_WORKSPACE/install"

      - name: Stage artifacts
        run: |
          set -eu
          mkdir -p dist
          cp install/plugins/*  dist/
          ls -l dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obn-orca-${{ needs.get-version.outputs.orca_tag }}-macos-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows  (x64 only — arm64 Windows runners require a paid GitHub plan)
  # ---------------------------------------------------------------------------
  build-windows:
    needs: get-version
    name: orca-windows-x64-v${{ needs.get-version.outputs.network_version }}
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staging = Join-Path $env:GITHUB_WORKSPACE "install"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          .\configure.ps1 `
            -ClientType orca_slicer `
            -WithVersion '${{ needs.get-version.outputs.network_version }}' `
            -Prefix $staging `
            -PatchConf:$false `
            -RegisterDShowFilter:$false `
            -EnableTests:$true

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build build --config Release --parallel

      - name: Test (probe_plugin)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location build
          ctest -C Release --output-on-failure
          Pop-Location

      - name: Install
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --install build --config Release

      - name: Stage artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src  = Join-Path $env:GITHUB_WORKSPACE "install"
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item -Path (Join-Path $src 'plugins\*') -Destination $dist -Force
          Get-ChildItem -Recurse $dist | Format-Table FullName,Length -AutoSize

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obn-orca-${{ needs.get-version.outputs.orca_tag }}-windows-x64
          path: dist/
          if-no-files-found: error
