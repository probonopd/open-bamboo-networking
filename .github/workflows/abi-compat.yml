# Nightly ABI compatibility check against the latest Bambu Studio tag.
# Compares bambu_networking.hpp + NetworkAgent.hpp + bambu_network_* dlsym
# list at the most recent bambulab/BambuStudio tag against the baseline
# under tools/abi_snapshot/vMM.mm.pp/. See tools/check_abi_compat.sh.

name: ABI compat

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: abi-compat
  cancel-in-progress: true

jobs:
  abi-compat:
    name: abi-compat
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl git

      - name: Check ABI against latest upstream Bambu Studio tag
        run: tools/check_abi_compat.sh
